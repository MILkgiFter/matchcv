name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: Build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate config
        run: node scripts/validate-production.js --profile ${{ inputs.profile }}
        continue-on-error: ${{ inputs.profile == 'preview' }}

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        if: inputs.platform == 'android' || inputs.platform == 'all'
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive

      - name: Build iOS
        if: inputs.platform == 'ios' || inputs.platform == 'all'
        run: eas build --platform ios --profile ${{ inputs.profile }} --non-interactive
